<svg xmlns="http://www.w3.org/2000/svg" width="1300" height="230" viewBox="0 0 1300 230" font-family="JetBrains Mono, Fira Code, Consolas, Menlo, monospace">
  <!-- terminal window -->
  <rect x="0" y="0" width="1300" height="230" rx="10" fill="#1e1e2e"/>
  <!-- title bar -->
  <rect x="0" y="0" width="1300" height="32" rx="10" fill="#313244"/>
  <rect x="0" y="20" width="1300" height="12" fill="#313244"/>
  <circle cx="20" cy="16" r="6" fill="#f38ba8"/>
  <circle cx="40" cy="16" r="6" fill="#f9e2af"/>
  <circle cx="60" cy="16" r="6" fill="#a6e3a1"/>
  <text x="650" y="20" font-size="13" fill="#a6adc8" text-anchor="middle">kali@kali: ~/Projects/claude-statusline/.claude/worktrees/demo</text>

  <!-- empty prompt box -->
  <rect x="20" y="46" width="1260" height="42" rx="8" fill="#181825" stroke="#585b70" stroke-width="1.5"/>
  <text x="36" y="73" font-size="16" fill="#cdd6f4">&gt;</text>
  <rect x="52" y="59" width="8" height="18" fill="#cdd6f4"/>

  <!-- line 1: heavy context usage (70%), deep into a session -->
  <text x="20" y="128" font-size="15" xml:space="preserve">
    <tspan fill="#D97757" font-weight="bold">Sonnet 5</tspan><tspan fill="#D97757"> (high)</tspan><tspan fill="#6E6E6E"> | </tspan><tspan fill="#B482FF">thinking: on</tspan><tspan fill="#6E6E6E"> | </tspan><tspan fill="#D7E182">Learning</tspan><tspan fill="#6E6E6E"> | </tspan><tspan fill="#19B45F">█</tspan><tspan fill="#2DB655">█</tspan><tspan fill="#42B84B">█</tspan><tspan fill="#56BA41">█</tspan><tspan fill="#6BBC37">█</tspan><tspan fill="#7FBE2D">█</tspan><tspan fill="#94C023">█</tspan><tspan fill="#A8C219">█</tspan><tspan fill="#BDC40F">█</tspan><tspan fill="#D1C605">█</tspan><tspan fill="#DCBF01">█</tspan><tspan fill="#DCAE03">█</tspan><tspan fill="#DC9D05">█</tspan><tspan fill="#DC8D07">█</tspan><tspan fill="#3C3C3C">██████</tspan><tspan fill="#e0e0e0"> 🔥 </tspan><tspan fill="#DC8D07" font-weight="bold">70%</tspan><tspan fill="#6E6E6E"> | </tspan><tspan fill="#DCC800">$3.15</tspan><tspan fill="#6E6E6E"> | </tspan><tspan fill="#19B45F">+212</tspan><tspan fill="#e0e0e0"> </tspan><tspan fill="#DC2814">-58</tspan><tspan fill="#6E6E6E"> | </tspan><tspan fill="#78C8FF">5h: ● 82% (resets 11:30 PM)</tspan><tspan fill="#6E6E6E"> | </tspan><tspan fill="#78C8FF">7d: ◑ 54% (2d3h)</tspan>
  </text>

  <!-- line 2: inside a Claude Code worktree — the isolated worktree name + the original branch, no plain "branch:" segment -->
  <text x="20" y="163" font-size="15" xml:space="preserve">
    <tspan fill="#96C8FF">📁 ~/Projects/claude-statusline/.claude/worktrees/demo</tspan><tspan fill="#6E6E6E"> | </tspan><tspan fill="#00DCDC">🌿 worktree-demo</tspan><tspan fill="#6E6E6E"> | </tspan><tspan fill="#DCB400">← master</tspan>
  </text>

  <!-- Claude Code's own plan-mode indicator (rendered by Claude Code itself, not the statusline script).
       Color is Claude Code's real "planMode" theme token (dark theme): rgb(72,150,140). -->
  <text x="20" y="198" font-size="14" xml:space="preserve">
    <tspan fill="#48968C">⏸ plan mode on</tspan><tspan fill="#7f849c"> (shift+tab to cycle)</tspan>
  </text>
</svg>
